# Verity dev stack in one command (run from this directory):
#
#   docker compose -f docker-compose.dev.yml up
#
# Lives in the verity repo for persistence, but orchestrates the SIBLING
# repos — it expects the standard workspace layout:
#
#   verisphere/
#     verity/            (this repo — the extension itself runs on the host)
#     verity-api/
#     verity-ingestor/
#     verity-dashboard/
#
# Brings up the gateway (verity-api) + the ingestor + the dashboard
# dev server, all with hot reload (sources are bind-mounted; tsx/vite watch
# them from inside the containers). node_modules live in named volumes so
# container-native binaries (esbuild etc.) don't clash with host installs —
# first start runs npm install per service, so it takes a few minutes once.
#
# Postgres is NOT included — services use your host Postgres. Compose
# interpolates DATABASE_URL from `verity/.env` (git-ignored). Use
# host.docker.internal (not localhost) so containers can reach the Mac DB:
#
#   DATABASE_URL=postgres://USER:PASS@host.docker.internal:5432/verity
#
# Secrets still come from each service's git-ignored .env (bind-mounted).
# DATABASE_URL is injected here (compose env beats dotenv), so the host
# rewrite above wins over localhost in those files.
#
# NOT included: the extension (this repo) — Chrome must load dist/ from your
# host disk and CRXJS's HMR is host-oriented, so run `npm run dev` here
# directly. The Verisphere app is remote (test.verisphere.co).

services:
  verity-api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../verity-api:/app
      - verity-api-modules:/app/node_modules
    ports:
      - "8790:8790"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in verity/.env — use host.docker.internal:5432, not localhost}

  verity-ingestor:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../verity-ingestor:/app
      - verity-ingestor-modules:/app/node_modules
    ports:
      - "8791:8791"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in verity/.env — use host.docker.internal:5432, not localhost}

  verity-dashboard:
    image: node:22-alpine
    working_dir: /app
    # --host 0.0.0.0 so Vite accepts connections from outside the container.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../verity-dashboard:/app
      - verity-dashboard-modules:/app/node_modules
    ports:
      - "5183:5183"

volumes:
  verity-api-modules:
  verity-ingestor-modules:
  verity-dashboard-modules:
